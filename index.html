<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Simulador de Empréstimo</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container">
    <h1>Simulador de Empréstimo</h1>

    <input type="text" id="valor" placeholder="R$ 0,00">
    <input type="text" id="taxa" placeholder="Taxa (%)">
    <input type="number" id="parcelas" placeholder="Número de parcelas">

    <button id="btnCalcular">Calcular</button>

    <p id="erro" class="erro"></p>

    <div id="resultado" class="resultado-container"></div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
